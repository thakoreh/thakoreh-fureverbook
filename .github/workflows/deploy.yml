name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Convex
        run: |
          npm install convex
          npx convex dev --yes &
          CONVEX_PID=$!
          echo "Convex PID: $CONVEX_PID"
          # Wait for Convex to start
          sleep 15
          # Get the deployment URL
          cat .env.local | grep CONVEX_DEPLOYMENT
          echo "Waiting for Convex to be ready..."
          sleep 10

      - name: Build
        run: |
          export NEXT_PUBLIC_CONVEX_URL=${CONVEX_URL}
          npm run build

      - name: Export static
        run: npx next export

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
